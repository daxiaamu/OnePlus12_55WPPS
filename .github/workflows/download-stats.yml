name: Update download statistics

on:
  schedule:
    - cron: "17 2 * * *"
  workflow_dispatch:
  release:
    types: [published, deleted]

permissions:
  contents: write

jobs:
  update-download-stats:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Collect and persist download counts
        uses: actions/github-script@v7
        env:
          STATS_FILE: download_stats.json
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const path = process.env.STATS_FILE;
            const releases = await github.paginate(github.rest.repos.listReleases, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100
            });
            const previous = fs.existsSync(path)
              ? JSON.parse(fs.readFileSync(path, 'utf8'))
              : { totalDownloads: 0, releases: {} };
            const history = previous.releases || {};
            const active = new Set();

            for (const release of releases) {
              const key = release.tag_name;
              active.add(key);
              const downloads = (release.assets || []).reduce(
                (sum, asset) => sum + Number(asset.download_count || 0), 0
              );
              const old = history[key] || {};
              history[key] = {
                releaseId: release.id,
                downloads,
                status: 'active',
                firstSeen: old.firstSeen || release.created_at,
                lastSeen: new Date().toISOString()
              };
            }

            for (const [key, old] of Object.entries(history)) {
              if (!active.has(key)) {
                history[key] = {
                  ...old,
                  status: 'deleted',
                  lastSeen: old.lastSeen || new Date().toISOString()
                };
              }
            }

            const versionKey = (key) => {
              const m = key.match(/^v?(\d+)(?:\.(\d+))?(?:\.(\d+))?/);
              return m ? [Number(m[1]), Number(m[2] || 0), Number(m[3] || 0)] : [0, 0, 0];
            };
            const ordered = {};
            for (const key of Object.keys(history).sort((a, b) => {
              const av = versionKey(a), bv = versionKey(b);
              return bv[0]-av[0] || bv[1]-av[1] || bv[2]-av[2] || b.localeCompare(a);
            })) {
              ordered[key] = history[key];
            }

            const totalDownloads = Object.values(ordered)
              .reduce((sum, item) => sum + Number(item.downloads || 0), 0);
            fs.writeFileSync(path, JSON.stringify({
              totalDownloads,
              releases: ordered
            }, null, 2) + '\n');

      - name: Commit statistics
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add download_stats.json
          git diff --cached --quiet || git commit -m "Update download statistics"
          git push
